<script id="people-template" type="text/x-handlebars-template">
    {{#each Contest}}
        <tr><td colspan="3">{{'@text'}}</td></tr>
        {{#if Choice.length }}
          {{#each Choice}}
            <tr>
              <td width="30%">{{'@text'}}</td>
              <td width="50%"><div class="background-bar"><span class="color-bar" style="width:{{choiceVotePercent}}%">{{choiceVotePercent}}</span></div></td>
              <td width="20%">{{'@totalVotes'}}</td>
            </tr>
          {{/each}}
        {{else}}
          {{#with Choice}}
            <tr>
              <td>{{'@text'}}</td>
              <td><div class="background-bar"><span class="color-bar" style="width:{{choiceVotePercent}}%">{{choiceVotePercent}}</span></div>{{choiceVotePercent}}</td>
              <td>{{'@totalVotes'}}</td>
            </tr>
          {{/with}}
        {{/if}}
      {{/each}}
    </script>
<script type="text/javascript">
$(document).ready(function() {

    // compile our template
    var template = Handlebars.compile($("#people-template").html());

    // var data = {

    //     ]
    // };

    var data_url = "test.json";

    $(document).ready(function() {
        $.getJSON(data_url,
            function(data) {

                for (let i = 0; i < data.ElectionResult.Contest.length; i++) {
                    if (Object.prototype.toString.call(data.ElectionResult.Contest[i].Choice) === '[object Array]') {
                        //test.push(true)
                        //} else test.push(false)
                        var allVotes = [];
                        var sumChoiceVotes;
                        var choiceVotePercent;
                        for (let j = 0; j < data.ElectionResult.Contest[i].Choice.length; j++) {
                            allVotes.push(Number(data.ElectionResult.Contest[i].Choice[j]['@totalVotes']))
                            sumChoiceVotes = allVotes.reduce((pv, cv) => pv + cv, 0);
                        }
                        for (let j = 0; j < data.ElectionResult.Contest[i].Choice.length; j++) {
                            data.ElectionResult.Contest[i].Choice[j].totalRaceVotes = sumChoiceVotes;
                            choiceVotePercent = ((Number(data.ElectionResult.Contest[i].Choice[j]['@totalVotes']) / sumChoiceVotes) * 100).toFixed(2);
                            data.ElectionResult.Contest[i].Choice[j].choiceVotePercent = choiceVotePercent;
                        }
                    } else {
                        data.ElectionResult.Contest[i].Choice.totalRaceVotes = data.ElectionResult.Contest[i].Choice['@totalVotes'];
                        choiceVotePercent = ((Number(data.ElectionResult.Contest[i].Choice['@totalVotes']) / Number(data.ElectionResult.Contest[i].Choice['@totalVotes'])) * 100).toFixed(2);
                        data.ElectionResult.Contest[i].Choice.choiceVotePercent = choiceVotePercent;
                    }
                }
                console.log(data.ElectionResult);


                $('#list').html(template(data.ElectionResult));



                // Not sure I need to do this
                var raceData = {},
                    electionData = [];

                for (let [key, value] of Object.entries(data.ElectionResult.Contest)) {
                    //console.log(key, value);
                }

                raceData.contests = data.ElectionResult.Contest;
                //race.quantity = quantity;
                electionData.push({ raceData: raceData });
                //console.log(electionData[0].raceData.contests[1]['@text']);
                //console.log(electionData);

                var details = [];
                for (let i = 0; i < electionData[0].raceData.contests.length; i++) {
                    details.push(electionData[0].raceData.contests[i]['@text'])
                }
                //console.log(details);
            });
    });

    // $('#list').html(template(data));
});
</script>
